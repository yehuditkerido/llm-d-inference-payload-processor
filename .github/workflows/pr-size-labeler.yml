name: PR Size Labeler

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - name: size-label
        uses: pascalgn/size-label-action@v0.5.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IGNORED: |
            go.sum
            go.mod
            *.generated.go
            vendor/**
        with:
          sizes: >
            {
              "0": "size/XS",
              "10": "size/S",
              "30": "size/M",
              "100": "size/L",
              "500": "size/XL",
              "1000": "size/XXL"
            }
